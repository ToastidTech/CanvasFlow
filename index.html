<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CanvasFlow Creative Studio</title>

  <!-- =======================
       STYLES (NO EXTERNAL CSS YET)
  ======================== -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070b10;
      color: white;
    }

    .app {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
      outline: none;
    }

    .format-row {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #1f6fff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3a86ff;
    }

    #output {
      margin-top: 20px;
      display: grid;
      gap: 20px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .meta-post {
      background: #111827;
      padding: 15px;
      border-left: 4px solid #3a86ff;
      border-radius: 10px;
    }

    .youtube-thumb {
      background: #111;
      padding: 15px;
      border-left: 4px solid #ff0033;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <!-- =======================
       APP UI
  ======================== -->
  <div class="app">

    <h1>Generate Visual Creatives</h1>

    <!-- INPUT -->
    <input id="prompt" type="text" placeholder="Enter your idea..." />

    <!-- FORMAT SELECTORS -->
    <div class="format-row">
      <button id="metaBtn">Meta Feed Post</button>
      <button id="youtubeBtn">YouTube Thumbnail</button>
    </div>

    <!-- APP UI ======================== -->
<div class="app">

  <h1>Generate Visual Creatives</h1>

  <!-- INPUT -->
  <input id="prompt" type="text" placeholder="Enter your idea..." />

  <!-- FORMAT SELECTORS -->
  <div class="format-row">
    <button id="metaBtn">Meta Feed Post</button>
    <button id="youtubeBtn">YouTube Thumbnail</button>
  </div>

  <!-- GENERATE -->
  <button id="generateBtn">Generate</button>

  <!-- OUTPUT -->
  <div id="output"></div>

</div>

<<script>
  console.log("NEW SCRIPT LOADED");
document.addEventListener("DOMContentLoaded", () => {

  const generateBtn = document.getElementById("generateBtn");
  const output = document.getElementById("output");
  const promptInput = document.getElementById("prompt");

  generateBtn.addEventListener("click", generate);

  function generate() {

    const prompt = promptInput.value.trim();

    if (!prompt) {
      output.innerHTML = `
        <div class="card">
          Please enter a prompt first.
        </div>
      `;
      return;
    }

    output.innerHTML = `
      <div class="card">
        <h2>Creative Generated</h2>
        <p><strong>Prompt:</strong> ${prompt}</p>
        <p>Your generated creative will appear here.</p>
      </div>
    `;
  }

});
</script>
