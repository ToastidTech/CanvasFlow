<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlocking CanvasFlow... | Toastid Tech, LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1628;
    --gold:#C9A84C;
    --white:#ffffff;
    --gray:#8a94a6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'DM Sans', sans-serif;
    background:var(--navy);
    color:var(--white);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
  }
  .card{
    max-width:420px;
  }
  h1{
    font-family:'Playfair Display', serif;
    color:var(--gold);
    font-size:2rem;
    margin-bottom:14px;
  }
  p{
    color:var(--gray);
    font-size:.95rem;
    line-height:1.6;
    margin-bottom:18px;
  }
  .spinner{
    width:40px; height:40px;
    border:4px solid #2a3a5c;
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 24px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .btn-gold{
    background:var(--gold);
    color:var(--navy);
    border:none;
    border-radius:8px;
    padding:12px 24px;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
  }
  .success-icon{
    width:64px; height:64px;
    margin:0 auto 20px;
  }
  .hidden{ display:none; }
</style>
</head>
<body>

<div class="card">

  <!-- Loading state -->
  <div id="loading-state">
    <div class="spinner"></div>
    <h1>Unlocking CanvasFlow...</h1>
    <p>Hang tight while we activate your full access.</p>
  </div>

  <!-- Success state -->
  <div id="success-state" class="hidden">
    <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M8 12l2.5 2.5L16 9" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>You're Unlocked!</h1>
    <p>Full access to CanvasFlow is now active on this device — watermark removed, all templates unlocked. Thank you for supporting Toastid Tech, LLC.</p>
    <a href="index.html" class="btn-gold">Back to CanvasFlow</a>
  </div>

</div>

<script>
  // Set the unlock flag for this device/browser
  try {
    localStorage.setItem('cf_unlocked', 'true');
  } catch (e) {
    console.error('Could not set unlock flag:', e);
  }

  // Show success state after a brief delay, then redirect
  setTimeout(() => {
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('success-state').classList.remove('hidden');
  }, 1200);

  // Auto-redirect back to the app after a few seconds
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 4500);
</script>

</body>
</html>
